units:

- name: "Foundations of Linear Algebra"
  description: This unit introduces fundamental concepts of linear algebra, focusing
    on vector spaces, matrices, and linear transformations. Students will learn how
    to represent and manipulate data using these tools, laying the groundwork for
    their application in estimation theory.
  learning_outcomes:
  - Master the principles of vector spaces, matrices, and linear transformations
  number_of_lessons: 7
  essential_questions: []
- name: "Random Vectors and Estimation"
  description: This unit delves into the core concepts of estimation theory, covering
    random vectors, covariance matrices, and their properties. Students will learn
    how to model and analyze uncertainty in data, a crucial skill for developing effective
    estimators.
  learning_outcomes:
  - Understand and apply the properties of random vectors and covariance matrices
  - Derive and utilize correlation and cross-correlation matrices in data analysis
  number_of_lessons: 7
  essential_questions: []
- name: "Advanced Estimation Techniques and Applications"
  description: This unit explores advanced topics in estimation theory, including
    Gaussian distributions, the Law of Large Numbers, the Central Limit Theorem, and
    least squares estimation. Students will apply these concepts to real-world problems
    in signal processing and communications, culminating in a final project where
    they design a simple estimation model.
  learning_outcomes:
  - Perform linear transformations and interpret their effects on data
  - Apply the Central Limit Theorem and Law of Large Numbers in estimation contexts
  - Calculate and interpret expectations, variances, and covariance for multivariable
    functions
  - Design and evaluate linear estimators using minimum mean square error (MMSE) techniques
  - Develop analytical skills for practical applications in signal processing and
    communications
  number_of_lessons: 6
  essential_questions: []
