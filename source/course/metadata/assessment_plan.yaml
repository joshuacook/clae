submission_requirements: |
  All assignments must be submitted as Pandoc Markdown files (.md) with:
  
  - Mathematical equations using LaTeX syntax
  - Code blocks with syntax highlighting
  - Figures and tables
  - Citations and references

evaluation_criteria:
  - Accuracy and completeness of solutions
  - Clarity of explanations and justifications
  - Application of concepts to real-world problems
  - Quality of implementation and analysis
  - Effective communication of results
